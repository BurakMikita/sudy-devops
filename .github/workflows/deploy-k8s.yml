name: Deploy k8s
 
on:
  push:
    branches: [main]
 
jobs:
  checks:
    uses: ./.github/workflows/pr-check.yml
 
  build:
    needs: [checks]
    uses: ./.github/workflows/build-push.yml
    secrets: inherit
 
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p ~/.kube
          echo "$KUBE_CONFIG" | base64 -d > ~/.kube/config

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        env:
          IMAGE: ${{ needs.build.outputs.image_sha }}
        run: |
          helm upgrade --install backend-api ./helm/backend-api \
            --reuse-values \
            --set image.repository="${IMAGE%:*}" \
            --set image.tag="${IMAGE##*:}" \
            --wait \
            --timeout 4m
          kubectl annotate deployment/backend-api kubernetes.io/change-cause="${{ github.sha }}" --overwrite
 
  notify:
    name: Notify JOBs
    needs: [checks, deploy, build]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      check_result: ${{ needs.checks.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit