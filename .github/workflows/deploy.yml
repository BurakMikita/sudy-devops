name: DEPLOY

on:
  push:
    branches: [ "main" ]

jobs:
  check:
    uses: ./.github/workflows/pr-check.yml
  
  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Build
      - uses: docker/checkout@v4

      - name: Enter in Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build and push image to Docker Hub
        env:
          IMAGE_SHA: ${{ secrets.DOCKER_USER }}/backend:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.DOCKER_USER }}/backend:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST
          echo "image_sha=$IMAGE_SHA" >> $GITHUB_OUTPUT
         
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
           if [ -d ~/sudy-devops ]; then
             cd ~/sudy-devops && git pull origin main
           else
             git clone https://github.com/BurakMikita/sudy-devops ~/sudy-devops
           fi
           cd ~/sudy-devops
           docker compose up -d --build
  notify:
    needs: [check, deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      check_result: ${{ needs.check.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit

