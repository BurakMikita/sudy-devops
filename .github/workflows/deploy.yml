name: DEPLOY

on:
  push:
    branches: [ "main" ]

jobs:
  check:
    uses: ./.github/workflows/pr-check.yml

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
         host: ${{ secrets.SSH_HOST }}
         username: ${{ secrets.SSH_USER }}
         key: ${{ secrets.SSH_PRIVATE_KEY }}
         passphrase: ${{ secrets.SSH_PASSPHRASE }}
         script: |
           if [ -d ~/sudy-devops ]; then
             cd ~/sudy-devops && git pull origin main
           else
             git clone https://github.com/BurakMikita/sudy-devops ~/sudy-devops
           fi
           cd ~/sudy-devops
           docker compose up -d --build
