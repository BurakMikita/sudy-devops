name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build
        run: docker build -t ${{ secrets.DOCKER_USER }}/express-app:${{ github.sha }} .

      - name: Doker Login 
        run: echo ${{ secrets.DOCKER_PASS }} | docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Docker Push
        run: docker push ${{ secrets.DOCKER_USER }}/express-app:${{ github.sha }}


      
      