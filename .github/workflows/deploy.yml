name: DEPLOY

on:
  push:
    branches: [ "main" ]

jobs:
  check:
    uses: ./.github/workflows/pr-check.yml

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build and push image to Docker Hub
        env:
          IMAGE_SHA: ${{ secrets.DOCKER_USER }}/backend:sha-${{ github.sha }}
          IMAGE_LATEST: ${{ secrets.DOCKER_USER }}/backend:latest
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/sudy-devops
            sed -i "s|DOCKER_IMAGE=.*|DOCKER_IMAGE=${{ secrets.DOCKER_USER }}/backend:sha-${{ github.sha }}|" .env
            docker compose up -d --no-deps back

  notify:
    needs: [check, build, deploy]
    if: always()
    uses: ./.github/workflows/notify.yml
    with:
      check_result: ${{ needs.check.result }}
      deploy_result: ${{ needs.deploy.result }}
    secrets: inherit
