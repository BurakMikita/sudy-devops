apiVersion: apps/v1
kind: Deployment
metadata:
  name: talaka-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: talaka-backend
  template:
    metadata:
      labels:
        app: talaka-backend
    spec:
      containers:
        - name: talaka-backend
          image: ${BACKEND_IMAGE}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: talaka-config
            - secretRef:
                name: talaka-backend-secret
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: talaka-backend-service
spec:
  selector:
    app: talaka-backend
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
